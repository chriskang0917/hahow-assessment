schema: spec-driven

context: |
  Tech stack: TypeScript, React 19, Vite, TailwindCSS 4, Shadcn UI (based on Base UI)
  State: Zustand (client), TanStack Query 5 (server)
  Router: TanStack Router (file-based, auto code-splitting)
  HTTP: Axios with auto camelCase↔snake_case transform, JWT refresh interceptor
  Validation: Zod
  Testing: Vitest, MSW
  Linting: Biome + ESLint + Prettier (with Tailwind plugin)
  Package manager: pnpm
  Domain: Hahow Heroes 前端 assessment

  Architecture:
  - Feature-based modules under src/features/{name}/
  - Each feature has: components/, hooks/, services/, store/, schema/, utils/, mocks/
  - API 四層架構: *.api.ts (data access) → *.app.ts (business logic) → *.transform.ts (DTO→domain) → *.dto.ts (types)
  - Domain types in src/types/, DTO types co-located in services/
  - Shared UI in src/components/ui/ (Shadcn), src/components/common/, src/components/form/
  - Reuse existing src/lib/axios.ts for all HTTP calls
  - Arrow function components, kebab-case file names
  - Hooks wrap all Query/Mutation usage (no direct useQuery in components)

  Design system: See docs/DESIGN_GUIDE.md for color, spacing, typography, and component patterns

  Routing conventions (TanStack Router file-based):
  - Layout routes use route.tsx
  - Dynamic params use $paramName.tsx
  - routeTree.gen.ts is auto-generated — do NOT edit manually

  Testing conventions:
  - Test files co-located with source (*.test.ts in the same directory)
  - MSW handlers placed in the feature's mocks/ directory

  Available Makefile targets:
  - make dev — 啟動開發伺服器
  - make format — 程式碼格式化（Biome）
  - make lint — 執行 lint 檢查（Biome）
  - make check — 執行 Biome 全面檢查（format + lint）
  - make ci — 執行 CI 檢查（Biome）
  - make ts-check — TypeScript 型別檢查
  - make build — Docker 建置

rules:
  proposal:
    - 使用繁體中文撰寫
    - 保持精簡，500 字以內
    - 說明與現有架構的整合方式
  design:
    - 使用繁體中文撰寫
    - 聚焦架構決策與技術選型，非逐行實作細節
    - 保持精簡，避免冗長描述
  specs:
    - 使用繁體中文撰寫
    - 每個 requirement 使用 Given-When-Then 場景格式
    - 每個 requirement 須可驗證
  tasks:
    - 每個 task 控制在 2 小時以內
    - 遵循現有 feature module 結構
    - API 相關 task 須遵循四層架構 (api/app/transform/dto)
    - 每個 task 須包含驗證方式，引用對應的 Makefile target（如 make check、make ts-check）

references:
  api-skill: |
    API 新增時，請使用 /create-api skill（位於 .claude/skills/create-api/）。
    該 skill 定義了完整的四層架構生成規則（dto → api → transform → app）、
    檔案命名、函式命名、型別命名慣例，以及 TanStack Query hooks 的生成模式。
    詳見 .claude/skills/create-api/SKILL.md 與 .claude/skills/create-api/templates.md。
